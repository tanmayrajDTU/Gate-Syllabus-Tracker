<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GATE CSE Tracker</title>
<meta name="description" content="Checklist and roadmap tracker for GATE CSE 2027 preparation.">
<meta name="theme-color" content="#171d26">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23171d26'/%3E%3Ccircle cx='20' cy='20' r='7' fill='none' stroke='%23c9a24b' stroke-width='3'/%3E%3Ccircle cx='44' cy='20' r='7' fill='none' stroke='%235b7a9d' stroke-width='3'/%3E%3Ccircle cx='32' cy='46' r='7' fill='%23c9a24b'/%3E%3Cline x1='25' y1='25' x2='38' y2='41' stroke='%23c9a24b' stroke-width='3'/%3E%3Cline x1='39' y1='25' x2='36' y2='40' stroke='%235b7a9d' stroke-width='3'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23171d26'/%3E%3Ccircle cx='20' cy='20' r='7' fill='none' stroke='%23c9a24b' stroke-width='3'/%3E%3Ccircle cx='44' cy='20' r='7' fill='none' stroke='%235b7a9d' stroke-width='3'/%3E%3Ccircle cx='32' cy='46' r='7' fill='%23c9a24b'/%3E%3Cline x1='25' y1='25' x2='38' y2='41' stroke='%23c9a24b' stroke-width='3'/%3E%3Cline x1='39' y1='25' x2='36' y2='40' stroke='%235b7a9d' stroke-width='3'/%3E%3C/svg%3E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GATE Tracker">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#171d26;
    --paper:#f4efe4;
    --gold:#c9a24b;
    --slate:#5b7a9d;
    --rust:#9c5b45;
    --green:#6a9c6a;
    --line: rgba(241,234,217,0.14);
    --line-strong: rgba(241,234,217,0.28);
    --ease: cubic-bezier(.22,1,.36,1);
    --ease-spring: cubic-bezier(.34,1.56,.64,1);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  html{ scroll-behavior:smooth; }
  body{
    background: var(--ink);
    color: var(--paper);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:""; position:fixed; inset:-20%; z-index:0; pointer-events:none;
    background:
      radial-gradient(circle at 15% 20%, rgba(201,162,75,0.10), transparent 45%),
      radial-gradient(circle at 85% 75%, rgba(91,122,157,0.12), transparent 45%);
    animation: bgDrift 26s ease-in-out infinite alternate;
  }
  @keyframes bgDrift{
    0%{ transform: translate(0,0) scale(1); }
    100%{ transform: translate(2%,-3%) scale(1.06); }
  }
  ::selection{ background: var(--gold); color:var(--ink); }
  .app{max-width:780px; margin:0 auto; padding:28px 18px 80px; position:relative; z-index:1; animation: fadeSlideUp 0.5s var(--ease) both;}

  @keyframes fadeSlideUp{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }
  @keyframes fadeIn{ from{ opacity:0; } to{ opacity:1; } }
  @keyframes scalePop{ 0%{ transform:scale(0.6); } 60%{ transform:scale(1.15); } 100%{ transform:scale(1); } }
  @keyframes checkPop{ 0%{ transform:scale(1); } 40%{ transform:scale(1.25); } 100%{ transform:scale(1); } }
  @keyframes shimmerGlow{ 0%,100%{ box-shadow:0 0 0 rgba(201,162,75,0); } 50%{ box-shadow:0 0 22px rgba(201,162,75,0.35); } }
  @keyframes confettiFall{
    0%{ transform:translateY(0) rotate(0deg); opacity:1; }
    100%{ transform:translateY(120px) rotate(360deg); opacity:0; }
  }
  @keyframes flashText{ from{ opacity:0; transform:translateY(-3px); } to{ opacity:1; transform:translateY(0); } }
  @keyframes ringDraw{ from{ stroke-dashoffset: var(--ring-c, 63); } }

  .eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.18em;
    text-transform:uppercase; color: var(--gold); margin:0 0 6px;
    animation: fadeSlideUp 0.5s var(--ease) both;
  }
  h1{
    font-family:'Source Serif 4', serif; font-weight:600; font-size:clamp(24px,6vw,32px);
    margin:0 0 4px; letter-spacing:-0.01em;
    animation: fadeSlideUp 0.55s var(--ease) both 0.03s;
  }
  .sub{ color: rgba(241,234,217,0.55); font-size:13.5px; margin:0 0 18px; line-height:1.5; animation: fadeSlideUp 0.55s var(--ease) both 0.06s; }

  .sync-row{ display:flex; align-items:center; gap:8px; margin-bottom:18px; animation: fadeIn 0.6s var(--ease) both 0.1s; }
  .sync-dot{ width:7px; height:7px; border-radius:50%; flex-shrink:0; transition: background 0.3s var(--ease); }
  .sync-dot.synced{ background: var(--green); animation: scalePop 0.4s var(--ease-spring); }
  .sync-dot.saving{ background: var(--gold); animation: pulse 1s infinite; }
  .sync-dot.error{ background: var(--rust); }
  .sync-dot.loading{ background: rgba(241,234,217,0.35); }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .sync-text{ font-family:'IBM Plex Mono', monospace; font-size:11px; color:rgba(241,234,217,0.45); transition: color 0.3s; }
  .sync-text.error{ color: var(--rust); }
  .retry-btn{
    margin-left:auto; font-family:'IBM Plex Mono', monospace; font-size:11px; color: var(--gold);
    background:none; border:1px solid var(--line-strong); border-radius:20px; padding:4px 10px; cursor:pointer;
    transition: transform 0.15s var(--ease), background 0.2s;
  }
  .retry-btn:hover{ background: rgba(201,162,75,0.1); }
  .retry-btn:active{ transform: scale(0.94); }

  /* Total tracker (all subjects) */
  .total-tracker{
    border:1px solid var(--gold); border-radius:6px; padding:18px; margin-bottom:20px; position:relative; overflow:hidden;
    background: linear-gradient(180deg, rgba(201,162,75,0.08), transparent);
    animation: fadeSlideUp 0.5s var(--ease) both 0.12s;
    transition: box-shadow 0.4s;
  }
  .total-tracker.complete{ animation: fadeSlideUp 0.5s var(--ease) both 0.12s, shimmerGlow 2.2s ease-in-out infinite; }
  .total-tracker .instrument-row{ display:flex; align-items:baseline; justify-content:space-between; gap:12px; }
  .total-label{ font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold); margin:0 0 10px; }
  .total-pct{ font-family:'IBM Plex Mono', monospace; font-size:36px; font-weight:600; line-height:1; }
  .total-pct span{ font-size:15px; color:rgba(241,234,217,0.5); font-weight:400; }
  .total-meta{ font-family:'IBM Plex Mono', monospace; font-size:11.5px; color:rgba(241,234,217,0.5); text-align:right; }
  .mini-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap:6px; margin-top:14px; }
  .mini-subject{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; color:rgba(241,234,217,0.55); border:1px solid var(--line); border-radius:4px; padding:6px 8px; cursor:pointer; transition: border-color 0.2s var(--ease), transform 0.15s var(--ease), color 0.2s; }
  .mini-subject:hover{ border-color: var(--line-strong); transform: translateY(-1px); }
  .mini-subject:active{ transform: scale(0.97); }
  .mini-subject.current{ border-color: var(--gold); color: var(--gold); }
  .mini-subject-name{ display:block; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mini-track{ height:3px; background:rgba(241,234,217,0.12); border-radius:2px; overflow:hidden; }
  .mini-fill{ height:100%; background: var(--gold); transition: width 0.6s var(--ease); }

  .subjects{ display:flex; gap:8px; margin-bottom:18px; overflow-x:auto; padding-bottom:2px; animation: fadeSlideUp 0.5s var(--ease) both 0.16s; }
  .subject-pill{
    font-family:'IBM Plex Mono', monospace; font-size:11.5px; letter-spacing:0.03em; padding:8px 14px;
    border:1px solid var(--line-strong); border-radius:20px; color:rgba(241,234,217,0.55); cursor:pointer;
    white-space:nowrap; flex-shrink:0; background:transparent; transition: all 0.2s var(--ease);
  }
  .subject-pill:hover{ border-color: rgba(241,234,217,0.45); transform: translateY(-1px); }
  .subject-pill:active{ transform: scale(0.96); }
  .subject-pill.active{ background:rgba(201,162,75,0.14); border-color:var(--gold); color:var(--gold); }
  .subject-pill .p{ opacity:0.6; margin-left:6px; }

  .instrument{ border:1px solid var(--line-strong); border-radius:6px; padding:18px 18px 16px; margin-bottom:18px; position:relative; overflow:hidden; animation: fadeSlideUp 0.5s var(--ease) both 0.05s; }
  .instrument::before{ content:""; position:absolute; inset:0; background: repeating-linear-gradient(90deg, var(--line) 0px, var(--line) 1px, transparent 1px, transparent 24px); opacity:0.5; pointer-events:none; }
  .instrument-row{ display:flex; align-items:baseline; justify-content:space-between; gap:12px; position:relative; }
  .instrument-pct{ font-family:'IBM Plex Mono', monospace; font-size:38px; font-weight:600; color: var(--paper); line-height:1; font-variant-numeric: tabular-nums; }
  .instrument-pct span{ font-size:16px; color:rgba(241,234,217,0.5); font-weight:400; }
  .instrument-meta{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:rgba(241,234,217,0.55); text-align:right; }
  .track{ height:6px; background:rgba(241,234,217,0.1); border-radius:3px; margin-top:14px; overflow:hidden; position:relative; }
  .track-fill{ height:100%; background: linear-gradient(90deg, var(--slate), var(--gold)); border-radius:3px; transition: width 0.7s var(--ease); position:relative; overflow:hidden; }
  .track-fill::after{
    content:""; position:absolute; inset:0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    width:40%; animation: trackShine 2.6s ease-in-out infinite;
  }
  @keyframes trackShine{ 0%{ transform: translateX(-120%); } 100%{ transform: translateX(340%); } }

  .tabs{ display:flex; gap:2px; margin-bottom:16px; border:1px solid var(--line-strong); border-radius:6px; overflow:hidden; animation: fadeSlideUp 0.5s var(--ease) both 0.08s; }
  .tab{ flex:1; text-align:center; padding:11px 10px; cursor:pointer; font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:rgba(241,234,217,0.5); background:transparent; border:none; transition: color 0.2s, background 0.3s var(--ease); position:relative; }
  .tab.active{ background:rgba(201,162,75,0.14); color:var(--gold); }
  .tab:not(.active):hover{ color:var(--paper); }
  .tab:active{ transform: scale(0.98); }

  .edit-toggle-row{ display:flex; justify-content:flex-end; margin-bottom:12px; }
  .edit-toggle{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.05em; text-transform:uppercase;
    color: rgba(241,234,217,0.5); background:none; border:1px solid var(--line-strong); border-radius:20px;
    padding:6px 14px; cursor:pointer; display:flex; align-items:center; gap:6px; transition: all 0.2s var(--ease);
  }
  .edit-toggle:hover{ border-color: rgba(241,234,217,0.45); }
  .edit-toggle:active{ transform: scale(0.96); }
  .edit-toggle.on{ color: var(--gold); border-color: var(--gold); background: rgba(201,162,75,0.1); }

  .module{
    border:1px solid var(--line-strong); border-radius:6px; margin-bottom:12px; overflow:hidden;
    animation: fadeSlideUp 0.4s var(--ease) both; animation-delay: calc(var(--i, 0) * 45ms);
    transition: border-color 0.25s var(--ease), transform 0.2s var(--ease);
  }
  .module:hover{ border-color: rgba(241,234,217,0.4); }
  .module-head{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:14px 16px; cursor:pointer; user-select:none; transition: background 0.2s; }
  .module-head:hover{ background: rgba(241,234,217,0.03); }
  .module-title{ display:flex; align-items:baseline; gap:10px; flex:1; min-width:0; }
  .module-name{ font-family:'Source Serif 4', serif; font-size:17px; font-weight:600; }
  .module-name-input{
    font-family:'Source Serif 4', serif; font-size:16px; font-weight:600; background:rgba(241,234,217,0.06);
    border:1px solid var(--line-strong); border-radius:4px; color:var(--paper); padding:5px 8px; width:100%; max-width:320px;
    transition: border-color 0.2s;
  }
  .module-name-input:focus{ outline:none; border-color: var(--gold); }
  .module-stat{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:rgba(241,234,217,0.5); display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .module-ring{ width:26px; height:26px; flex-shrink:0; }
  .ring-fill{ transition: stroke-dashoffset 0.7s var(--ease); }
  .chev{ transition: transform 0.3s var(--ease); opacity:0.5; font-size:11px; }
  .module.open .chev{ transform: rotate(90deg); }
  .module-body-outer{ display:grid; grid-template-rows: 0fr; transition: grid-template-rows 0.35s var(--ease); }
  .module.open .module-body-outer{ grid-template-rows: 1fr; }
  .module-body{ overflow:hidden; min-height:0; border-top:1px solid var(--line); }
  .del-btn{
    font-family:'IBM Plex Mono', monospace; font-size:13px; color: var(--rust); background:none; border:none;
    cursor:pointer; padding:2px 6px; opacity:0.7; flex-shrink:0; transition: opacity 0.15s, transform 0.15s var(--ease);
  }
  .del-btn:hover{ opacity:1; transform: scale(1.15); }
  .del-btn:active{ transform: scale(0.9); }

  .item{ display:flex; align-items:center; gap:12px; padding:11px 16px; border-bottom:1px solid var(--line); cursor:pointer; transition: background 0.2s; }
  .item:last-child{ border-bottom:none; }
  .item:hover{ background: rgba(241,234,217,0.03); }
  .box{ width:18px; height:18px; border:1.5px solid rgba(241,234,217,0.35); border-radius:4px; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition: all 0.2s var(--ease-spring); }
  .box.checked{ background:var(--gold); border-color:var(--gold); animation: checkPop 0.35s var(--ease-spring); }
  .box.checked::after{ content:"✓"; color:var(--ink); font-size:12px; font-weight:700; animation: fadeIn 0.15s; }
  .item-name{ flex:1; font-size:14px; line-height:1.4; transition: color 0.3s; }
  .item.done .item-name{ color:rgba(241,234,217,0.4); text-decoration:line-through; }
  .item-hrs{ font-family:'IBM Plex Mono', monospace; font-size:11.5px; color:rgba(241,234,217,0.45); flex-shrink:0; }
  .item-name-input{
    flex:1; font-size:13.5px; background:rgba(241,234,217,0.06); border:1px solid var(--line-strong);
    border-radius:4px; color:var(--paper); padding:6px 8px; font-family:'Inter',sans-serif; transition: border-color 0.2s;
  }
  .item-name-input:focus, .item-hrs-input:focus{ outline:none; border-color: var(--gold); }
  .item-hrs-input{
    width:56px; font-family:'IBM Plex Mono', monospace; font-size:12px; background:rgba(241,234,217,0.06);
    border:1px solid var(--line-strong); border-radius:4px; color:var(--paper); padding:6px 6px; text-align:right; transition: border-color 0.2s;
  }

  .add-row{ display:flex; align-items:center; gap:8px; padding:11px 16px; border-top:1px dashed var(--line-strong); }
  .add-row input[type=text]{
    flex:1; font-size:13.5px; background:rgba(241,234,217,0.04); border:1px solid var(--line-strong);
    border-radius:4px; color:var(--paper); padding:7px 9px; font-family:'Inter',sans-serif; transition: border-color 0.2s;
  }
  .add-row input:focus{ outline:none; border-color: var(--gold); }
  .add-row input[type=number]{
    width:64px; font-family:'IBM Plex Mono', monospace; font-size:12px; background:rgba(241,234,217,0.04);
    border:1px solid var(--line-strong); border-radius:4px; color:var(--paper); padding:7px 6px; text-align:right; transition: border-color 0.2s;
  }
  .add-btn{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.05em; text-transform:uppercase;
    color:var(--ink); background:var(--gold); border:none; border-radius:4px; padding:7px 12px; cursor:pointer; flex-shrink:0;
    transition: transform 0.15s var(--ease-spring), opacity 0.2s;
  }
  .add-btn:hover{ opacity:0.9; }
  .add-btn:active{ transform: scale(0.93); }
  .add-module-row{ padding:14px 16px; border:1px dashed var(--line-strong); border-radius:6px; display:flex; gap:8px; align-items:center; animation: fadeSlideUp 0.3s var(--ease) both; }
  .add-module-row input{
    flex:1; font-size:14px; background:rgba(241,234,217,0.04); border:1px solid var(--line-strong);
    border-radius:4px; color:var(--paper); padding:9px 10px; font-family:'Source Serif 4', serif; transition: border-color 0.2s;
  }
  .add-module-row input:focus{ outline:none; border-color: var(--gold); }

  .roadmap-intro{ font-size:13px; color:rgba(241,234,217,0.5); margin-bottom:18px; line-height:1.6; }
  .path-wrap{ margin-bottom:8px; }
  .day-node{
    display:flex; gap:14px; padding:14px 4px; border-bottom:1px solid var(--line); cursor:pointer; align-items:flex-start; position:relative;
    animation: fadeSlideUp 0.4s var(--ease) both; animation-delay: calc(var(--i, 0) * 35ms);
    transition: background 0.2s;
    border-radius:4px;
  }
  .day-node:hover{ background: rgba(241,234,217,0.02); }
  .day-node:last-child{ border-bottom:none; }
  .node-col{ display:flex; flex-direction:column; align-items:center; width:34px; flex-shrink:0; }
  .node-circle{
    width:34px; height:34px; border-radius:50%; border:2px solid rgba(241,234,217,0.3); display:flex; align-items:center;
    justify-content:center; position:relative; flex-shrink:0; font-family:'IBM Plex Mono', monospace; font-size:12px;
    font-weight:600; color:rgba(241,234,217,0.6); background: var(--ink); z-index:1; transition: all 0.3s var(--ease-spring);
  }
  .node-circle svg{ position:absolute; inset:-2px; transform:rotate(-90deg); }
  .node-circle.complete{ border-color: var(--gold); color: var(--gold); background: rgba(201,162,75,0.12); animation: scalePop 0.4s var(--ease-spring); }
  .node-edge{ width:2px; flex:1; background: var(--line-strong); margin-top:2px; min-height:14px; transition: background 0.4s, opacity 0.4s; }
  .node-edge.complete{ background: var(--gold); opacity:0.5; }
  .day-info{ flex:1; padding-top:4px; }
  .day-title-row{ display:flex; align-items:baseline; justify-content:space-between; gap:8px; flex-wrap:wrap; }
  .day-title{ font-family:'Source Serif 4', serif; font-size:15.5px; font-weight:600; }
  .day-hrs{ font-family:'IBM Plex Mono', monospace; font-size:11.5px; color:rgba(241,234,217,0.45); white-space:nowrap; }
  .day-topics{ font-size:12.5px; color:rgba(241,234,217,0.45); margin-top:3px; line-height:1.5; }
  .day-tasks-outer{ display:grid; grid-template-rows: 0fr; transition: grid-template-rows 0.35s var(--ease); }
  .day-node.open .day-tasks-outer{ grid-template-rows: 1fr; }
  .day-tasks{ overflow:hidden; min-height:0; margin-top:0; border-top:0 solid var(--line); }
  .day-node.open .day-tasks{ margin-top:10px; border-top-width:1px; padding-top:10px; }

  .empty-subject{ border:1px dashed var(--line-strong); border-radius:6px; padding:28px 18px; text-align:center; color:rgba(241,234,217,0.4); font-size:13px; line-height:1.6; animation: fadeIn 0.4s; }
  .empty-modules{ border:1px dashed var(--line-strong); border-radius:6px; padding:24px 18px; text-align:center; color:rgba(241,234,217,0.4); font-size:13px; margin-bottom:12px; animation: fadeIn 0.4s; }

  .footer-note{ margin-top:26px; font-size:11.5px; color:rgba(241,234,217,0.35); text-align:center; font-family:'IBM Plex Mono', monospace; letter-spacing:0.03em; }

  .confetti-layer{ position:fixed; inset:0; pointer-events:none; z-index:50; overflow:hidden; }
  .confetti-piece{ position:absolute; top:-10px; border-radius:1px; animation: confettiFall 1.3s ease-in forwards; }

  @media (max-width: 420px){
    .instrument-pct{ font-size:32px; }
    .module-name{ font-size:16px; }
    .total-pct{ font-size:30px; }
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
    body::before{ animation:none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel" data-presets="react">

// =====================================================================

async function saveSubjectRow(subjectKey, {name, modules, done, breaks}){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/gate_progress?on_conflict=subject_key`, {
    method: 'POST',
    headers: { ...sbHeaders, 'Content-Type': 'application/json', Prefer: 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify([{ subject_key: subjectKey, name, modules, data: done, breaks: breaks || [], updated_at: new Date().toISOString() }]),
  });
  if(!res.ok) throw new Error(`save failed (${res.status})`);
}

// Roadmap is now built dynamically for every subject from its current
// module/topic order — always in sync with the checklist, and capped so
// no day exceeds MAX_HOURS_PER_DAY. `breaks` is a set of topic ids after
// which the person has manually forced an early day-split (editable from
// the Roadmap tab); the hour cap is enforced regardless of breaks.
const MAX_HOURS_PER_DAY = 8;

function buildRoadmap(allItems, breaksArr, cap){
  const breakSet = new Set(breaksArr || []);
  const days = [];
  let current = { items: [], hrs: 0 };
  const flush = ()=>{ if(current.items.length){ days.push(current); current = { items: [], hrs: 0 }; } };

  allItems.forEach(item=>{
    if(item.hrs > cap){
      flush();
      days.push({ items: [item], hrs: item.hrs });
      return;
    }
    if(current.items.length && current.hrs + item.hrs > cap){
      flush();
    }
    current.items.push(item);
    current.hrs += item.hrs;
    if(breakSet.has(item.id)){ flush(); }
  });
  flush();

  return days.map((d, idx)=>({
    n: idx + 1,
    hrs: d.hrs,
    items: d.items,
    modulesCovered: [...new Set(d.items.map(i=>i.module))],
  }));
}

function deriveData(modules){
  const allItems = (modules||[]).flatMap(m => m.items.map(it => ({...it, module:m.name, moduleKey:m.key})));
  const itemsById = Object.fromEntries(allItems.map(i=>[i.id,i]));
  const totalHrs = allItems.reduce((s,i)=>s+i.hrs,0);
  return { allItems, itemsById, totalHrs };
}

// ---------- APP-WIDE DATA STORE ----------
function useAppData(){
  const [subjects, setSubjects] = useState({}); // { key: {name, modules, done} }
  const [status, setStatus] = useState('loading');
  const [errorMsg, setErrorMsg] = useState('');

  const load = useCallback(async ()=>{
    setStatus('loading');
    try{
      const rows = await fetchAllRows();
      const merged = {};
      const toSeed = [];
      DEFAULT_SUBJECTS.forEach(def=>{
        const row = rows[def.key];
        if(row){
          merged[def.key] = { name: row.name || def.name, modules: row.modules || def.modules, done: row.data || {}, breaks: row.breaks || [] };
        }else{
          merged[def.key] = { name: def.name, modules: def.modules, done: {}, breaks: [] };
          toSeed.push(def.key);
        }
      });
      setSubjects(merged);
      setStatus('synced');
      setErrorMsg('');
      toSeed.forEach(k => { saveSubjectRow(k, merged[k]).catch(()=>{}); });
    }catch(e){
      const merged = {};
      DEFAULT_SUBJECTS.forEach(def=>{ merged[def.key] = { name: def.name, modules: def.modules, done: {}, breaks: [] }; });
      setSubjects(merged);
      setStatus('error');
      setErrorMsg('Could not reach the database — showing local defaults only, changes will not sync yet.');
    }
  },[]);

  useEffect(()=>{ load(); },[load]);

  const mutate = useCallback((subjectKey, updater)=>{
    setSubjects(prev=>{
      const cur = prev[subjectKey] || { name:'', modules:[], done:{}, breaks:[] };
      const nextSubject = updater(cur);
      const next = { ...prev, [subjectKey]: nextSubject };
      setStatus('saving');
      saveSubjectRow(subjectKey, nextSubject)
        .then(()=>{ setStatus('synced'); setErrorMsg(''); })
        .catch(()=>{ setStatus('error'); setErrorMsg('Last change may not have saved — check your connection.'); });
      return next;
    });
  },[]);

  return { subjects, status, errorMsg, mutate, reload: load };
}

// ---------- SMALL EDITABLE INPUTS ----------
function EditableText({value, onCommit, placeholder, className}){
  const [val, setVal] = useState(value);
  useEffect(()=>{ setVal(value); }, [value]);
  return (
    <input className={className} value={val} placeholder={placeholder}
      onChange={e=>setVal(e.target.value)}
      onClick={e=>e.stopPropagation()}
      onBlur={()=>{ const v=val.trim(); if(v && v!==value) onCommit(v); else setVal(value); }}
      onKeyDown={e=>{ if(e.key==='Enter'){ e.currentTarget.blur(); } }} />
  );
}

function EditableHrs({value, onCommit, className}){
  const [val, setVal] = useState(String(value));
  useEffect(()=>{ setVal(String(value)); }, [value]);
  return (
    <input type="number" step="0.1" min="0" className={className} value={val}
      onChange={e=>setVal(e.target.value)}
      onClick={e=>e.stopPropagation()}
      onBlur={()=>{ const n=parseFloat(val); if(!isNaN(n) && n>=0 && n!==value) onCommit(n); else setVal(String(value)); }}
      onKeyDown={e=>{ if(e.key==='Enter'){ e.currentTarget.blur(); } }} />
  );
}

function AddItemRow({onAdd}){
  const [name, setName] = useState('');
  const [hrs, setHrs] = useState('1');
  const submit = ()=>{
    const n = name.trim(); const h = parseFloat(hrs);
    if(!n) return;
    onAdd(n, isNaN(h)||h<0 ? 1 : h);
    setName(''); setHrs('1');
  };
  return (
    <div className="add-row" onClick={e=>e.stopPropagation()}>
      <input type="text" placeholder="New topic name" value={name} onChange={e=>setName(e.target.value)}
        onKeyDown={e=>{ if(e.key==='Enter') submit(); }} />
      <input type="number" step="0.1" min="0" value={hrs} onChange={e=>setHrs(e.target.value)}
        onKeyDown={e=>{ if(e.key==='Enter') submit(); }} />
      <button className="add-btn" onClick={submit}>+ Add</button>
    </div>
  );
}

function AddModuleRow({onAdd}){
  const [name, setName] = useState('');
  const submit = ()=>{ const n=name.trim(); if(!n) return; onAdd(n); setName(''); };
  return (
    <div className="add-module-row">
      <input type="text" placeholder="New module name" value={name} onChange={e=>setName(e.target.value)}
        onKeyDown={e=>{ if(e.key==='Enter') submit(); }} />
      <button className="add-btn" onClick={submit}>+ Add module</button>
    </div>
  );
}

// ---------- RINGS ----------
function RingMini({pct}){
  const r=10, c=2*Math.PI*r;
  return (
    <svg width="26" height="26" viewBox="0 0 26 26">
      <circle cx="13" cy="13" r={r} stroke="rgba(241,234,217,0.15)" strokeWidth="2.5" fill="none"/>
      <circle className="ring-fill" cx="13" cy="13" r={r} stroke="#c9a24b" strokeWidth="2.5" fill="none"
        strokeDasharray={c} strokeDashoffset={c-(pct/100)*c} strokeLinecap="round" transform="rotate(-90 13 13)"/>
    </svg>
  );
}
function NodeRing({pct, complete}){
  const r=15, c=2*Math.PI*r;
  return (
    <svg width="34" height="34" viewBox="0 0 34 34">
      <circle cx="17" cy="17" r={r} stroke={complete?"#c9a24b":"rgba(241,234,217,0.2)"} strokeWidth="2" fill="none"/>
      {!complete && pct>0 && (
        <circle className="ring-fill" cx="17" cy="17" r={r} stroke="#5b7a9d" strokeWidth="2" fill="none"
          strokeDasharray={c} strokeDashoffset={c-(pct/100)*c} strokeLinecap="round"/>
      )}
    </svg>
  );
}

// ---------- ANIMATED NUMBER ----------
function AnimatedNumber({value, decimals=1}){
  const [display, setDisplay] = useState(value);
  const prevRef = React.useRef(value);
  const rafRef = React.useRef(null);

  useEffect(()=>{
    const from = prevRef.current;
    const to = value;
    if(from === to){ setDisplay(to); return; }
    const start = performance.now();
    const duration = 500;
    cancelAnimationFrame(rafRef.current);
    const tick = (now)=>{
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      setDisplay(from + (to - from) * eased);
      if(t < 1){ rafRef.current = requestAnimationFrame(tick); }
      else{ prevRef.current = to; }
    };
    rafRef.current = requestAnimationFrame(tick);
    return ()=> cancelAnimationFrame(rafRef.current);
  }, [value]);

  return <React.Fragment>{display.toFixed(decimals)}</React.Fragment>;
}

// ---------- CONFETTI ----------
function Confetti({burstKey}){
  const pieces = useMemo(()=>{
    if(!burstKey) return [];
    const colors = ['#c9a24b', '#5b7a9d', '#f4efe4', '#9c5b45'];
    return Array.from({length: 26}).map((_,i)=>({
      id: i,
      left: Math.random()*100,
      color: colors[i % colors.length],
      size: 4 + Math.random()*5,
      delay: Math.random()*0.3,
      duration: 0.9 + Math.random()*0.6,
      rotate: Math.random()*360,
    }));
  }, [burstKey]);
  if(!pieces.length) return null;
  return (
    <div className="confetti-layer">
      {pieces.map(p=>(
        <div key={p.id} className="confetti-piece" style={{
          left: p.left + '%', width: p.size, height: p.size*0.4, background: p.color,
          animationDelay: p.delay + 's', animationDuration: p.duration + 's',
          transform: `rotate(${p.rotate}deg)`,
        }}/>
      ))}
    </div>
  );
}

// ---------- MODULE ----------
function Module({mod, done, editMode, openKey, setOpenKey, onToggleItem, onDeleteModule, onRenameModule, onAddItem, onDeleteItem, onRenameItem, onUpdateHrs, index}){
  const isOpen = openKey === mod.key;
  const totalHrs = mod.items.reduce((s,i)=>s+i.hrs,0);
  const doneHrs = mod.items.reduce((s,i)=>s+(done[i.id]?i.hrs:0),0);
  const pct = totalHrs ? Math.round((doneHrs/totalHrs)*100) : 0;

  return (
    <div className={"module" + (isOpen? " open":"")} style={{'--i': index}}>
      <div className="module-head" onClick={()=>setOpenKey(isOpen? null : mod.key)}>
        <div className="module-title">
          {editMode ? (
            <EditableText value={mod.name} className="module-name-input" onCommit={(v)=>onRenameModule(mod.key, v)}/>
          ) : (
            <span className="module-name">{mod.name}</span>
          )}
        </div>
        <div className="module-stat">
          <span><AnimatedNumber value={pct} decimals={0}/>%</span>
          <div className="module-ring"><RingMini pct={pct}/></div>
          {editMode && (
            <button className="del-btn" title="Delete module" onClick={(e)=>{ e.stopPropagation(); onDeleteModule(mod.key); }}>✕</button>
          )}
          <span className="chev">▶</span>
        </div>
      </div>
      <div className="module-body-outer">
      <div className="module-body">
        {mod.items.length === 0 && !editMode && (
          <div style={{padding:'14px 16px', fontSize:12.5, color:'rgba(241,234,217,0.4)'}}>No topics yet.</div>
        )}
        {mod.items.map(it=>(
          <div key={it.id} className={"item" + (done[it.id]? " done":"")} onClick={()=> !editMode && onToggleItem(it.id)}>
            {!editMode && <div className={"box" + (done[it.id]? " checked":"")}></div>}
            {editMode ? (
              <React.Fragment>
                <EditableText value={it.name} className="item-name-input" onCommit={(v)=>onRenameItem(mod.key, it.id, v)}/>
                <EditableHrs value={it.hrs} className="item-hrs-input" onCommit={(v)=>onUpdateHrs(mod.key, it.id, v)}/>
                <span className="item-hrs">h</span>
                <button className="del-btn" title="Delete topic" onClick={(e)=>{ e.stopPropagation(); onDeleteItem(mod.key, it.id); }}>✕</button>
              </React.Fragment>
            ) : (
              <React.Fragment>
                <div className="item-name">{it.name}</div>
                <div className="item-hrs">{it.hrs}h</div>
              </React.Fragment>
            )}
          </div>
        ))}
        {editMode && <AddItemRow onAdd={(name,hrs)=>onAddItem(mod.key, name, hrs)}/>}
      </div>
      </div>
    </div>
  );
}

// ---------- DAY NODE (roadmap) ----------
function DayNode({day, done, toggle, isLast, openDay, setOpenDay, editRoadmap, breakSet, onToggleBreak, index}){
  const total = day.hrs;
  const doneH = day.items.reduce((s,it)=>s+(done[it.id]?it.hrs:0),0);
  const pct = total ? (doneH/total)*100 : 0;
  const complete = total>0 && pct === 100;
  const isOpen = openDay === day.n;
  const topicsLine = day.modulesCovered.join(', ');

  return (
    <div className={"day-node" + (isOpen? " open":"")} style={{'--i': index}} onClick={()=>setOpenDay(isOpen? null: day.n)}>
      <div className="node-col">
        <div className={"node-circle" + (complete? " complete":"")}>
          <NodeRing pct={pct} complete={complete}/>
          <span style={{position:'relative', zIndex:2}}>{complete? "✓" : day.n}</span>
        </div>
        {!isLast && <div className={"node-edge" + (complete? " complete":"")}></div>}
      </div>
      <div className="day-info">
        <div className="day-title-row">
          <div className="day-title">Day {day.n}</div>
          <div className="day-hrs">{total.toFixed(1)}h / {MAX_HOURS_PER_DAY}h cap</div>
        </div>
        <div className="day-topics">{topicsLine}</div>
        <div className="day-tasks-outer">
        <div className="day-tasks">
          {day.items.map(it=>(
            <div key={it.id} className={"item" + (done[it.id]? " done":"")} style={{padding:'8px 0'}}
                 onClick={(e)=>{ e.stopPropagation(); toggle(it.id); }}>
              <div className={"box" + (done[it.id]? " checked":"")}></div>
              <div className="item-name">{it.module} — {it.name}</div>
              <div className="item-hrs">{it.hrs}h</div>
              {editRoadmap && (
                <button className="del-btn" title={breakSet.has(it.id) ? "Undo split — merge with next day" : "Split day after this topic"}
                  onClick={(e)=>{ e.stopPropagation(); onToggleBreak(it.id); }}>
                  {breakSet.has(it.id) ? "⌃" : "⌄"}
                </button>
              )}
            </div>
          ))}
        </div>
        </div>
      </div>
    </div>
  );
}

function SyncBadge({status, errorMsg, onRetry}){
  const label = {
    loading: 'Loading from database…', synced: 'Synced with database', saving: 'Saving…', error: errorMsg || 'Sync error',
  }[status];
  return (
    <div className="sync-row">
      <div className={"sync-dot " + status}></div>
      <span key={status} className={"sync-text" + (status==='error'? " error":"")} style={{animation:'flashText 0.3s var(--ease)'}}>{label}</span>
      {status==='error' && <button className="retry-btn" onClick={onRetry}>Retry</button>}
    </div>
  );
}

  const [subjectKey, setSubjectKey] = useState(DEFAULT_SUBJECTS[0].key);

  const [editRoadmap, setEditRoadmap] = useState(false);

  const [openDay, setOpenDay] = useState(null);

  const subjectData = subjects[subjectKey] || { name:'', modules:[], done:{}, breaks:[] };
  const { allItems, itemsById, totalHrs } = useMemo(()=>deriveData(subjectData.modules), [subjectData.modules]);
  const done = subjectData.done || {};
  const breaks = subjectData.breaks || [];
  const breakSet = useMemo(()=> new Set(breaks), [breaks]);
  const days = useMemo(()=> buildRoadmap(allItems, breaks, MAX_HOURS_PER_DAY), [allItems, breaks]);

  useEffect(()=>{
    setOpenKey(subjectData.modules[0] ? subjectData.modules[0].key : null);
    setOpenDay(null);
    setTab('checklist');
    setEditMode(false);
    setEditRoadmap(false);
  }, [subjectKey]);

  const doneHrs = useMemo(()=> allItems.reduce((s,i)=>s+(done[i.id]?i.hrs:0),0), [done, allItems]);
  const pct = totalHrs ? (doneHrs/totalHrs)*100 : 0;
  const doneCount = allItems.filter(i=>done[i.id]).length;
  const daysComplete = days.filter(d=> d.items.every(it=>done[it.id])).length;

  const totalTracker = useMemo(()=>{
    let doneH=0, totH=0;
    const perSubject = DEFAULT_SUBJECTS.map(def=>{
      const sd = subjects[def.key] || { modules: def.modules, done: {} };
      const { allItems: items, totalHrs: tot } = deriveData(sd.modules);
      const dh = items.reduce((s,i)=> s + (sd.done && sd.done[i.id] ? i.hrs : 0), 0);
      doneH += dh; totH += tot;
      return { key: def.key, name: sd.name || def.name, pct: tot ? (dh/tot)*100 : 0 };
    });
    return { doneH, totH, pct: totH ? (doneH/totH)*100 : 0, perSubject };
  }, [subjects]);

  const [confettiBurst, setConfettiBurst] = useState(0);
  const prevTotalPctRef = React.useRef(null);
  useEffect(()=>{
    const p = totalTracker.pct;
    if(prevTotalPctRef.current !== null && prevTotalPctRef.current < 100 && p >= 100 && totalTracker.totH > 0){
      setConfettiBurst(k=>k+1);
    }
    prevTotalPctRef.current = p;
  }, [totalTracker.pct, totalTracker.totH]);

  const onToggleItem = (id)=> mutate(subjectKey, cur=>({ ...cur, done: { ...cur.done, [id]: !cur.done[id] } }));

  const onToggleBreak = (itemId)=> mutate(subjectKey, cur=>{
    const set = new Set(cur.breaks || []);
    if(set.has(itemId)) set.delete(itemId); else set.add(itemId);
    return { ...cur, breaks: Array.from(set) };
  });

  const onAddModule = (name)=> mutate(subjectKey, cur=>({ ...cur, modules: [...cur.modules, { key: uid('mod'), name, items: [] }] }));

  const onDeleteModule = (moduleKey)=> mutate(subjectKey, cur=>{
    const mod = cur.modules.find(m=>m.key===moduleKey);
    const newDone = { ...cur.done };
    (mod ? mod.items : []).forEach(i=>{ delete newDone[i.id]; });
    return { ...cur, modules: cur.modules.filter(m=>m.key!==moduleKey), done: newDone };
  });

  const onRenameModule = (moduleKey, name)=> mutate(subjectKey, cur=>({
    ...cur, modules: cur.modules.map(m=> m.key===moduleKey ? { ...m, name } : m),
  }));

  const onAddItem = (moduleKey, name, hrs)=> mutate(subjectKey, cur=>({
    ...cur, modules: cur.modules.map(m=> m.key===moduleKey ? { ...m, items: [...m.items, { id: uid('item'), name, hrs }] } : m),
  }));

  const onDeleteItem = (moduleKey, itemId)=> mutate(subjectKey, cur=>{
    const newDone = { ...cur.done }; delete newDone[itemId];
    return { ...cur, modules: cur.modules.map(m=> m.key===moduleKey ? { ...m, items: m.items.filter(i=>i.id!==itemId) } : m), done: newDone };
  });

  const onRenameItem = (moduleKey, itemId, name)=> mutate(subjectKey, cur=>({
    ...cur, modules: cur.modules.map(m=> m.key===moduleKey ? { ...m, items: m.items.map(i=> i.id===itemId ? { ...i, name } : i) } : m),
  }));

  const onUpdateHrs = (moduleKey, itemId, hrs)=> mutate(subjectKey, cur=>({
    ...cur, modules: cur.modules.map(m=> m.key===moduleKey ? { ...m, items: m.items.map(i=> i.id===itemId ? { ...i, hrs } : i) } : m),
  }));

  return (
    <div className="app">
      <p className="eyebrow">GATE CSE 2027</p>
      <h1>Traversal</h1>
      <p className="sub">A checklist and route through your GATE CSE subjects. Backed by a shared database, so progress and structure are the same on every device.</p>

      <SyncBadge status={status} errorMsg={errorMsg} onRetry={reload}/>

      <Confetti burstKey={confettiBurst}/>

      <div className={"total-tracker" + (totalTracker.pct >= 100 && totalTracker.totH > 0 ? " complete" : "")}>
        <p className="total-label">Total tracker — all subjects</p>
        <div className="instrument-row">
          <div className="total-pct"><AnimatedNumber value={totalTracker.pct}/><span>%</span></div>
          <div className="total-meta">{totalTracker.doneH.toFixed(1)}h / {totalTracker.totH.toFixed(1)}h<br/>{DEFAULT_SUBJECTS.length} subjects</div>
        </div>
        <div className="track"><div className="track-fill" style={{width: totalTracker.pct + '%'}}></div></div>
        <div className="mini-grid">
          {totalTracker.perSubject.map(s=>(
            <div key={s.key} className={"mini-subject" + (s.key===subjectKey? " current":"")} onClick={()=>setSubjectKey(s.key)}>
              <span className="mini-subject-name">{s.name}</span>
              <div className="mini-track"><div className="mini-fill" style={{width: s.pct + '%'}}></div></div>
            </div>
          ))}
        </div>
      </div>

      <div className="subjects">
        {DEFAULT_SUBJECTS.map(def=>{
          const sd = subjects[def.key];
          const p = totalTracker.perSubject.find(s=>s.key===def.key);
          return (
            <div key={def.key} className={"subject-pill" + (def.key===subjectKey? " active":"")} onClick={()=>setSubjectKey(def.key)}>
              {(sd && sd.name) || def.name}<span className="p">{p ? Math.round(p.pct) : 0}%</span>
            </div>
          );
        })}
      </div>

      {status==='loading' ? (
        <p style={{color:'rgba(241,234,217,0.5)', fontFamily:'IBM Plex Mono, monospace', fontSize:13}}>Loading progress…</p>
      ) : (
      <React.Fragment>
      <div className="instrument">
        <div className="instrument-row">
          <div className="instrument-pct"><AnimatedNumber value={pct}/><span>%</span></div>
          <div className="instrument-meta">
            {doneHrs.toFixed(2)}h / {totalHrs.toFixed(2)}h<br/>
            {doneCount}/{allItems.length} topics{days.length ? ` · ${daysComplete}/${days.length} days` : ''}
          </div>
        </div>
        <div className="track"><div className="track-fill" style={{width: pct+'%'}}></div></div>
      </div>

      <div className="tabs">
        <button className={"tab" + (tab==='checklist'?' active':'')} onClick={()=>setTab('checklist')}>Checklist</button>
        <button className={"tab" + (tab==='roadmap'?' active':'')} onClick={()=>setTab('roadmap')}>Roadmap</button>
      </div>

      {tab==='checklist' && (
        <div>
          <div className="edit-toggle-row">
            <button className={"edit-toggle" + (editMode? " on":"")} onClick={()=>setEditMode(e=>!e)}>
              {editMode ? "✓ Done editing" : "✎ Edit modules & topics"}
            </button>
          </div>
          {subjectData.modules.length === 0 && (
            <div className="empty-modules">No modules yet — turn on editing above to add your first one.</div>
          )}
          {subjectData.modules.map((mod, idx)=>(
            <Module key={mod.key} mod={mod} done={done} editMode={editMode} openKey={openKey} setOpenKey={setOpenKey} index={idx}
              onToggleItem={onToggleItem} onDeleteModule={onDeleteModule} onRenameModule={onRenameModule}
              onAddItem={onAddItem} onDeleteItem={onDeleteItem} onRenameItem={onRenameItem} onUpdateHrs={onUpdateHrs}/>
          ))}
          {editMode && <AddModuleRow onAdd={onAddModule}/>}
        </div>
      )}

      {tab==='roadmap' && (
        days.length ? (
          <div>
            <p className="roadmap-intro">Auto-built from this subject's topics, in order, capped at {MAX_HOURS_PER_DAY} hours a day — never more. Tap a day to open its tasks and check them off. Turn on editing to force an earlier split on any day.</p>
            <div className="edit-toggle-row">
              <button className={"edit-toggle" + (editRoadmap? " on":"")} onClick={()=>setEditRoadmap(e=>!e)}>
                {editRoadmap ? "✓ Done editing" : "✎ Edit roadmap"}
              </button>
            </div>
            <div className="path-wrap">
              {days.map((d,idx)=>(
                <DayNode key={d.n} day={d} done={done} toggle={onToggleItem} isLast={idx===days.length-1} index={idx}
                  openDay={openDay} setOpenDay={setOpenDay} editRoadmap={editRoadmap} breakSet={breakSet} onToggleBreak={onToggleBreak}/>
              ))}
            </div>
          </div>
        ) : (
          <div className="empty-subject">No topics yet for this subject — add some in the Checklist tab and a roadmap will build itself here automatically.</div>
        )
      )}
      </React.Fragment>
      )}

      <p className="footer-note">Progress and structure live in one shared database — open this same file from any device to see it.</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
